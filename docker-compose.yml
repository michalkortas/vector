services:
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
    environment:
      APP_NAME: Vector
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      APP_AUTO_SETUP: "true"
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: vector
      DB_USERNAME: vector
      DB_PASSWORD: vector
      DB_TEST_DATABASE: vector_testing
      DB_ROOT_USERNAME: root
      DB_ROOT_PASSWORD: vector
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
    depends_on:
      - mariadb
      - redis

  queue:
    build: .
    command: ["php", "artisan", "queue:work", "--tries=1", "--timeout=120"]
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    environment:
      APP_NAME: Vector
      APP_ENV: local
      APP_DEBUG: "true"
      APP_AUTO_SETUP: "false"
      DB_CONNECTION: mysql
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: vector
      DB_USERNAME: vector
      DB_PASSWORD: vector
      DB_TEST_DATABASE: vector_testing
      DB_ROOT_USERNAME: root
      DB_ROOT_PASSWORD: vector
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      REDIS_CLIENT: predis
      REDIS_HOST: redis
    depends_on:
      - app
      - mariadb
      - redis

  mariadb:
    image: mariadb:11.4
    environment:
      MARIADB_DATABASE: vector
      MARIADB_USER: vector
      MARIADB_PASSWORD: vector
      MARIADB_ROOT_PASSWORD: vector
    volumes:
      - ./docker/mariadb-init:/docker-entrypoint-initdb.d
      - mariadb-data:/var/lib/mysql
    ports:
      - "3306:3306"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mariadb-data:
